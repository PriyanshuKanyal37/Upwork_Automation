name: backend-ci

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install backend dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      # NOTE:
      # Type checking currently has legacy baseline errors in this repository.
      # Keep this non-blocking so deploy pipeline remains stable while debt is fixed incrementally.
      - name: Type check (non-blocking)
        continue-on-error: true
        run: uv run mypy app tests

      - name: Migration check
        run: uv run python scripts/check_migrations.py

      - name: Test suite
        run: uv run pytest
